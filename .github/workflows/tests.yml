name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Qt translations
        run: >
          pyside6-lrelease
          translations/OfficePDFBinder_en.ts
          -qm translations/OfficePDFBinder_en.qm
          -nounfinished

      - name: Run tests
        run: python -m pytest
