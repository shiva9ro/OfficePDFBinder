name: Feature request / 改善要望
description: Suggest an improvement or new feature / 改善案や新機能を提案する
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. / 改善要望ありがとうございます。

        Do not attach personal data, confidential business information, internal documents, or non-public files.
        個人情報、業務情報、内部資料、非公開ファイルは添付しないでください。
        Keep workflow examples suitable for public disclosure. / 業務例も公開可能な範囲で記載してください。

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve / 困っていること
      description: Describe the workflow or problem. / どのような作業で困っているかを書いてください。
      placeholder: "Example / 例: It is difficult to find a page when organizing many PDFs."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior / 希望する動作
      description: Describe the improvement you would like. / どのように改善されるとよいかを書いてください。
      placeholder: "Example / 例: Search pages by filename or page number."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area / 関係する機能
      options:
        - Add files / ファイル追加
        - Reorder pages / ページ並び替え
        - Save PDF / PDF保存
        - Word / Excel / PowerPoint conversion / Office変換
        - Header and footer / ヘッダーとフッター
        - Bookmarks / しおり
        - Export / エクスポート
        - Install / uninstall / インストール・アンインストール
        - UI / usability / 操作性
        - Other / その他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / 代替手段
      description: Describe current workarounds or other software you use. / 現在の回避方法や代替ソフトを書いてください。

  - type: textarea
    id: additional
    attributes:
      label: Additional context / 補足
      description: Add any other useful information. / ほかに伝えておきたいことがあれば書いてください。
