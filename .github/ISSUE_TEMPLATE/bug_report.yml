name: Bug report / 不具合報告
description: Report a problem with Office PDF Binder / 不具合を報告する
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. / 不具合報告ありがとうございます。

        Do not attach personal data, confidential business information, internal documents, or non-public files.
        個人情報、業務情報、内部資料、非公開ファイルは添付しないでください。
        Use public samples or dummy files when reproduction files are necessary.
        再現には公開可能なサンプルファイルやダミーファイルを使用してください。

  - type: input
    id: app_version
    attributes:
      label: Application version / アプリのバージョン
      description: "Example / 例: 1.2.0"
      placeholder: "1.2.0"
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: Installation type / 実行方法
      options:
        - Installer / インストーラー版
        - Python source / Pythonソースから実行
        - Other / その他
    validations:
      required: true

  - type: input
    id: windows_version
    attributes:
      label: Windows version / Windowsのバージョン
      description: "Example / 例: Windows 11 24H2 / Windows 10 22H2"
      placeholder: "Windows 11 24H2"
    validations:
      required: true

  - type: dropdown
    id: office_installed
    attributes:
      label: Microsoft Office availability / Microsoft Officeの有無
      description: Select this when the issue involves Word, Excel, or PowerPoint conversion. / Office変換に関係する場合は必ず選択してください。
      options:
        - Installed / インストール済み
        - Not installed / 未インストール
        - Unknown / 不明
        - Not relevant / この不具合には関係しない
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary / 不具合の概要
      description: Briefly describe what happened. / 何が起きたかを簡潔に書いてください。
      placeholder: "Example / 例: An error appears when saving a PDF."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 再現手順
      description: Provide specific steps where possible. / できるだけ具体的に書いてください。
      placeholder: |
        1. Start the application / アプリを起動する
        2. Add a file / ファイルを追加する
        3. Save the combined PDF / PDFを保存する
        4. The error appears / エラーが表示される
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期待した動作
      placeholder: "Example / 例: The PDF is saved without an error."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 実際の動作
      placeholder: "Example / 例: An error message is displayed."
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Input file types / 使用したファイルの種類
      description: Describe file types and page counts without including private filenames or files. / 種類やページ数を記載し、非公開ファイルは添付しないでください。
      placeholder: |
        Example / 例:
        - 3 PDF files, 20 pages total / PDF 3ファイル、合計20ページ
        - 1 Word file / Word 1ファイル
        - 1 Excel file with multiple sheets / Excel 1ファイル、複数シート

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / スクリーンショット
      description: Attach screenshots only when they contain no personal or confidential information. / 個人情報や業務情報を含まない画面だけを添付してください。

  - type: textarea
    id: additional
    attributes:
      label: Additional context / 補足
      description: Add any other useful information. / ほかに伝えておきたいことがあれば書いてください。
